# DOC PROOF - Render Blueprint
# Partage DB/Redis avec prospects-app (base docproof, prefixe docproof:)

services:
  - type: web
    runtime: node
    name: doc-proof

    buildCommand: npm install && npm run build
    startCommand: npm run start
    preDeployCommand: npx prisma migrate deploy

    region: oregon

    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_KEY_PREFIX
        value: docproof:
      - key: POLYGON_AMOY_RPC_URL
        value: https://rpc-amoy.polygon.technology
      - key: MAINTENANCE_MODE
        value: "false"
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs

      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: NEXT_PUBLIC_DOC_PROOF_CONTRACT_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_CHAIN_ID
        sync: false
